<?xml version="1.0" encoding="UTF-8"?>
<!--
  WireGuard GUI Rust — tray icon, CONNECTED state
  Accent blue / active. Distinct at a glance: bright shield + closed lock.
  Original artwork; not affiliated with or endorsed by the WireGuard project.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 48 48"
     width="48" height="48"
     role="img"
     aria-label="WireGuard GUI — connected">

  <!-- shield body: vivid steel-blue fill when connected -->
  <path d="M24 2
           L44 10
           Q45 34 24 46
           Q3 34 4 10
           Z"
        fill="#1E3A5F"
        stroke="#4C9BE8"
        stroke-width="2"
        stroke-linejoin="round"/>

  <!-- shield highlight top-left shimmer -->
  <path d="M24 5
           L40 12
           Q41 16 39 18"
        fill="none"
        stroke="#7EC8FF"
        stroke-width="1.5"
        stroke-linecap="round"
        opacity="0.5"/>

  <!-- lock shackle (closed arc) -->
  <path d="M17 22
           A7 7 0 0 1 31 22"
        fill="none"
        stroke="#7EC8FF"
        stroke-width="2.2"
        stroke-linecap="round"/>

  <!-- lock body -->
  <rect x="14" y="21" width="20" height="14" rx="3" ry="3"
        fill="#2A5490"
        stroke="#4C9BE8"
        stroke-width="1.8"/>

  <!-- keyhole dot -->
  <circle cx="24" cy="27" r="2.5"
          fill="#7EC8FF"/>
  <!-- keyhole slot -->
  <rect x="22.2" y="27" width="3.6" height="5" rx="1.2"
        fill="#7EC8FF"/>

  <!-- wifi-like signal arc bottom-right corner = "connected" badge -->
  <circle cx="37" cy="36" r="2.2"
          fill="#4CE88A"/>
  <path d="M34 33 A4.2 4.2 0 0 1 40 33"
        fill="none" stroke="#4CE88A" stroke-width="1.6"
        stroke-linecap="round"/>
  <path d="M32 31 A6.5 6.5 0 0 1 42 31"
        fill="none" stroke="#4CE88A" stroke-width="1.4"
        stroke-linecap="round" opacity="0.65"/>

</svg>
